<!DOCTYPE html>
<html lang="es">

<head>

  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap"

  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.4/babel.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: #0d0d1a;
      font-family: 'Barlow', sans-serif;
      color: #fff
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(247, 37, 133, 0.4);
      border-radius: 2px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-8px)
      }

      75% {
        transform: translateX(8px)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fadein {
      animation: fadeIn .25s ease forwards
    }
  </style>
</head>

<body>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ══════════════════════════════════════════
    // SUPABASE CONFIG
    // ══════════════════════════════════════════
    const SB = "https://lzkkobgdtzfxfcbhvjzj.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6a2tvYmdkdHpmeGZjYmh2anpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODExNzcsImV4cCI6MjA5NDg1NzE3N30.ae_Zhj07X1uM-c9rNdfLZjZFytqLFIwbO0cF7tNkLPo";
    const SALT = "!Panini2026";

    // ══════════════════════════════════════════
    // ALBUM DATA
    // ══════════════════════════════════════════
    const GROUPS = [
      { id: "A", teams: [{ id: "MEX", name: "México", flag: "🇲🇽", host: true }, { id: "RSA", name: "Sudáfrica", flag: "🇿🇦" }, { id: "KOR", name: "Corea del Sur", flag: "🇰🇷" }, { id: "CZE", name: "Chequia", flag: "🇨🇿" }] },
      { id: "B", teams: [{ id: "CAN", name: "Canadá", flag: "🇨🇦", host: true }, { id: "SUI", name: "Suiza", flag: "🇨🇭" }, { id: "QAT", name: "Qatar", flag: "🇶🇦" }, { id: "BIH", name: "Bosnia-Herzegovina", flag: "🇧🇦" }] },
      { id: "C", teams: [{ id: "BRA", name: "Brasil", flag: "🇧🇷" }, { id: "MAR", name: "Marruecos", flag: "🇲🇦" }, { id: "HAI", name: "Haití", flag: "🇭🇹" }, { id: "SCO", name: "Escocia", flag: "🏴󠁧󠁢󠁳󠁣󠁴󠁿" }] },
      { id: "D", teams: [{ id: "USA", name: "Estados Unidos", flag: "🇺🇸", host: true }, { id: "PAR", name: "Paraguay", flag: "🇵🇾" }, { id: "AUS", name: "Australia", flag: "🇦🇺" }, { id: "TUR", name: "Türkiye", flag: "🇹🇷" }] },
      { id: "E", teams: [{ id: "GER", name: "Alemania", flag: "🇩🇪" }, { id: "CUW", name: "Curaçao", flag: "🇨🇼", debut: true }, { id: "CIV", name: "Costa de Marfil", flag: "🇨🇮" }, { id: "ECU", name: "Ecuador", flag: "🇪🇨" }] },
      { id: "F", teams: [{ id: "NED", name: "Países Bajos", flag: "🇳🇱" }, { id: "JPN", name: "Japón", flag: "🇯🇵" }, { id: "SWE", name: "Suecia", flag: "🇸🇪" }, { id: "TUN", name: "Túnez", flag: "🇹🇳" }] },
      { id: "G", teams: [{ id: "BEL", name: "Bélgica", flag: "🇧🇪" }, { id: "EGY", name: "Egipto", flag: "🇪🇬" }, { id: "IRN", name: "Irán", flag: "🇮🇷" }, { id: "NZL", name: "Nueva Zelanda", flag: "🇳🇿" }] },
      { id: "H", teams: [{ id: "ESP", name: "España", flag: "🇪🇸" }, { id: "CPV", name: "Cabo Verde", flag: "🇨🇻", debut: true }, { id: "KSA", name: "Arabia Saudita", flag: "🇸🇦" }, { id: "URU", name: "Uruguay", flag: "🇺🇾" }] },
      { id: "I", teams: [{ id: "FRA", name: "Francia", flag: "🇫🇷" }, { id: "SEN", name: "Senegal", flag: "🇸🇳" }, { id: "NOR", name: "Noruega", flag: "🇳🇴" }, { id: "IRQ", name: "Iraq", flag: "🇮🇶" }] },
      { id: "J", teams: [{ id: "ARG", name: "Argentina", flag: "🇦🇷" }, { id: "ALG", name: "Argelia", flag: "🇩🇿" }, { id: "AUT", name: "Austria", flag: "🇦🇹" }, { id: "JOR", name: "Jordania", flag: "🇯🇴", debut: true }] },
      { id: "K", teams: [{ id: "POR", name: "Portugal", flag: "🇵🇹" }, { id: "COD", name: "DR Congo", flag: "🇨🇩" }, { id: "UZB", name: "Uzbekistán", flag: "🇺🇿", debut: true }, { id: "COL", name: "Colombia", flag: "🇨🇴" }] },
      { id: "L", teams: [{ id: "ENG", name: "Inglaterra", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" }, { id: "CRO", name: "Croacia", flag: "🇭🇷" }, { id: "GHA", name: "Ghana", flag: "🇬🇭" }, { id: "PAN", name: "Panamá", flag: "🇵🇦" }] },
    ];
    const SPECIAL = [
      { id: "FWC", name: "Sección Especial / Introducción", count: 20, flag: "🌎" },
      { id: "MUS", name: "FIFA Museum", count: 11, flag: "🏆" },
      { id: "COC", name: "Coca-Cola Exclusivos", count: 14, flag: "🥤" },
    ];
    const ALL_TEAMS = GROUPS.flatMap(g => g.teams);
    const TOTAL = ALL_TEAMS.length * 20 + SPECIAL.reduce((a, s) => a + s.count, 0);
    const GC = { A: "#e63946", B: "#2196f3", C: "#4caf50", D: "#ff9800", E: "#9c27b0", F: "#00bcd4", G: "#f06292", H: "#8bc34a", I: "#ff5722", J: "#3f51b5", K: "#009688", L: "#ffc107" };
    const AVATARS = ["⚽", "🏆", "🌟", "🦁", "🐯", "🦅", "🔥", "💎", "🏅", "⚡", "🎯", "🦊", "🐉", "🎪", "🚀", "🌙"];

    // ══════════════════════════════════════════
    // SUPABASE API
    // ══════════════════════════════════════════
    const H = (tok) => ({ "Content-Type": "application/json", "apikey": KEY, "Authorization": `Bearer ${tok || KEY}` });
    const authPost = async (path, body, tok) => {
      const r = await fetch(`${SB}/auth/v1${path}`, { method: "POST", headers: H(tok), body: JSON.stringify(body) });
      const json = await r.json().catch(() => ({}));
      return { status: r.status, ...json };
    };
    const dbReq = async (path, method = "GET", body = null, tok = null, extra = {}) => { const r = await fetch(`${SB}/rest/v1${path}`, { method, headers: { ...H(tok), ...extra }, body: body ? JSON.stringify(body) : undefined }); if (r.status === 204 || r.status === 201) return null; return r.json(); };

    const apiSignUp = (e, p, m) => authPost("/signup", { email: e, password: p + SALT, data: m });
    const apiSignIn = (e, p) => authPost("/token?grant_type=password", { email: e, password: p + SALT });
    const apiRefresh = (rt) => authPost("/token?grant_type=refresh_token", { refresh_token: rt });
    const apiSignOut = (tok) => fetch(`${SB}/auth/v1/logout`, { method: "POST", headers: H(tok) });

    const apiGetProgress = (tok, uid) => dbReq(`/sticker_progress?user_id=eq.${uid}&select=owned`, "GET", null, tok);
    const apiUpsertProgress = (tok, uid, owned) => dbReq("/sticker_progress", "POST", { user_id: uid, owned, updated_at: new Date().toISOString() }, tok, { "Prefer": "resolution=merge-duplicates,return=minimal" });
    const apiGetProfiles = (tok) => dbReq("/profiles?select=user_id,name,avatar", "GET", null, tok);
    const apiGetAllProgress = (tok) => dbReq("/sticker_progress?select=user_id,owned", "GET", null, tok);
    const apiUpsertProfile = (tok, uid, name, avatar) => dbReq("/profiles", "POST", { user_id: uid, name, avatar }, tok, { "Prefer": "resolution=merge-duplicates,return=minimal" });

    // ══════════════════════════════════════════
    // SESSION (localStorage — funciona en browser)
    // ══════════════════════════════════════════
    const SK = "p26s", UK = "p26u";
    const loadSess = () => { try { const v = localStorage.getItem(SK); return v ? JSON.parse(v) : null; } catch { return null; } };
    const saveSess = (s) => { try { localStorage.setItem(SK, JSON.stringify(s)); } catch { } };
    const clearSess = () => { try { localStorage.removeItem(SK); } catch { } };
    const loadLocalU = () => { try { const v = localStorage.getItem(UK); return v ? JSON.parse(v) : []; } catch { return []; } };
    const saveLocalU = (u) => { try { localStorage.setItem(UK, JSON.stringify(u)); } catch { } };
    const INSTALL_KEY = "p26i";
    const loadInstallTips = () => { try { return localStorage.getItem(INSTALL_KEY) !== "1"; } catch { return true; } };
    const saveInstallTips = () => { try { localStorage.setItem(INSTALL_KEY, "1"); } catch { } };

    // ══════════════════════════════════════════
    // UI ATOMS
    // ══════════════════════════════════════════
    const Bar = ({ pct, color }) => (
      <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 999, height: 6, overflow: "hidden" }}>
        <div style={{ width: `${Math.min(pct, 100)}%`, height: "100%", background: color, borderRadius: 999, transition: "width .4s" }} />
      </div>
    );

    const Spin = () => (
      <div style={{ background: "#0d0d1a", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: 40, height: 40, border: "3px solid rgba(247,37,133,0.2)", borderTop: "3px solid #f72585", borderRadius: "50%", animation: "spin .8s linear infinite" }} />
      </div>
    );

    const InstallTip = ({ onClose }) => (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
        <div style={{ width: "100%", maxWidth: 540, background: "#0f172a", borderRadius: 24, border: "1px solid rgba(255,255,255,0.08)", padding: 24, boxShadow: "0 32px 120px rgba(0,0,0,0.45)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18, gap: 14 }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: 0.4, marginBottom: 6 }}>Guardar la app en el inicio</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>Sigue estos pasos para abrir esta app rápido desde tu dispositivo.</div>
            </div>
            <button onClick={onClose} style={{ border: "none", background: "transparent", color: "#fff", fontSize: 26, cursor: "pointer", lineHeight: 1 }}>×</button>
          </div>
          <div style={{ display: "grid", gap: 16, fontSize: 14, color: "#e2e8f0", lineHeight: 1.7 }}>
            <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, padding: 16 }}>
              <div style={{ fontWeight: 700, marginBottom: 6 }}>Android / Chrome</div>
              Abre el menú del navegador (⋮) y elige <strong style={{ color: "#f72585" }}>Agregar a pantalla de inicio</strong>.
            </div>
            <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, padding: 16 }}>
              <div style={{ fontWeight: 700, marginBottom: 6 }}>iPhone / Safari</div>
              Toca el botón <strong style={{ color: "#f72585" }}>Compartir</strong> y luego selecciona <strong style={{ color: "#f72585" }}>Agregar a pantalla de inicio</strong>.
            </div>
            <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, padding: 16 }}>
              <div style={{ fontWeight: 700, marginBottom: 6 }}>Windows / Desktop</div>
              Abre el menú del navegador y busca <strong style={{ color: "#f72585" }}>Instalar aplicación</strong> o <strong style={{ color: "#f72585" }}>Agregar acceso directo</strong>.
            </div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.55)", paddingTop: 4 }}>Esta ventana se mostrará solo una vez. Si prefieres verla después, cierra esta pantalla y sigue usando la app.</div>
          </div>
          <button onClick={onClose} style={{ marginTop: 22, width: "100%", padding: "14px 18px", borderRadius: 14, border: "none", background: "#f72585", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Entendido</button>
        </div>
      </div>
    );

    function PinPad({ value, onChange, onSubmit, label }) {
      return (
        <div>
          {label && <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", textAlign: "center", marginBottom: 12, fontWeight: 600, letterSpacing: 1 }}>{label}</div>}
          <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 20 }}>
            {[0, 1, 2, 3].map(i => (
              <div key={i} style={{ width: 52, height: 64, borderRadius: 12, border: `2px solid ${value.length > i ? "#f72585" : "rgba(255,255,255,0.1)"}`, background: value.length > i ? "rgba(247,37,133,0.08)" : "rgba(255,255,255,0.03)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, color: "#f72585", transition: "all .15s" }}>
                {value.length > i ? "●" : ""}
              </div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, maxWidth: 216, margin: "0 auto" }}>
            {[1, 2, 3, 4, 5, 6, 7, 8, 9, "", 0, "⌫"].map((k, i) => (
              <button key={i} onClick={() => {
                if (k === "") return;
                if (k === "⌫") { onChange(value.slice(0, -1)); return; }
                const next = value.length < 4 ? value + k : value;
                onChange(next);
                if (next.length === 4) setTimeout(() => onSubmit(next), 120);
              }} style={{ padding: "15px 0", borderRadius: 10, border: "1px solid rgba(255,255,255,0.08)", background: k === "" ? "transparent" : "rgba(255,255,255,0.05)", color: "#fff", fontSize: 18, fontWeight: 700, cursor: k === "" ? "default" : "pointer", visibility: k === "" ? "hidden" : "visible", fontFamily: "'Barlow Condensed',sans-serif" }}>
                {k}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════
    // AUTH SCREEN
    // ══════════════════════════════════════════
    function AuthScreen({ onLogin }) {
      const [localUsers] = useState(() => loadLocalU());
      const [view, setView] = useState("list");
      const [selUser, setSelU] = useState(null);
      const [pin, setPin] = useState("");
      const [form, setForm] = useState({ email: "", name: "", avatar: "⚽", phone: "", pin: "" });
      const [pinStep, setPinStep] = useState(1);
      const [err, setErr] = useState("");
      const [loading, setLoad] = useState(false);
      const [shake, setShake] = useState(false);

      const doShake = (msg) => { setErr(msg); setShake(true); setTimeout(() => setShake(false), 500); setTimeout(() => setErr(""), 2500); };

      const handleLogin = async (p, email) => {
        const userEmail = email || selUser?.email || "";
        if (!userEmail.includes("@")) {
          setErr("Email inválido");
          return;
        }
        setLoad(true);
        const data = await apiSignIn(userEmail, p);
        setLoad(false);
        if (data.access_token) {
          saveSess({ access_token: data.access_token, refresh_token: data.refresh_token, userId: data.user.id });
          const currentUsers = loadLocalU();
          const updated = currentUsers.map(u => u.email === userEmail ? { ...u, ...(data.user.user_metadata || {}) } : u);
          if (!updated.some(u => u.email === userEmail)) {
            updated.push({
              email: userEmail,
              name: data.user.user_metadata?.name || "Usuario",
              avatar: data.user.user_metadata?.avatar || "⚽",
              userId: data.user.id
            });
          }
          saveLocalU(updated);
          const loggedUser = updated.find(u => u.email === userEmail) || { email: userEmail, name: data.user.user_metadata?.name || "Usuario", avatar: data.user.user_metadata?.avatar || "⚽" };
          const prog = await apiGetProgress(data.access_token, data.user.id);
          onLogin(loggedUser, data.access_token, data.refresh_token, data.user.id, prog?.[0]?.owned || {});
        } else {
          const msg = data.error_description || data.msg || "";
          doShake(msg.includes("Email not confirmed") ? "Email no confirmado. Revisá tu correo." : "PIN incorrecto");
          setPin("");
        }
      };

      const handleReg1 = () => {
        const phone = form.phone.trim();
        if (!form.email.includes("@")) { setErr("Email inválido"); return; }
        if (!form.name.trim()) { setErr("Ingresá tu nombre"); return; }
        if (!phone) { setErr("Ingresá tu teléfono con código de país"); return; }
        if (!/^\+\d[\d\s\-()]{6,}$/.test(phone)) { setErr("Teléfono inválido. Incluí +Código"); return; }
        if (localUsers.some(u => u.email.toLowerCase() === form.email.toLowerCase())) {
          setErr("Email ya registrado"); return;
        }
        setErr(""); setPinStep(1); setPin(""); setView("reg2");
      };

      const handleReg2 = async (p) => {
        if (pinStep === 1) { setForm(f => ({ ...f, pin: p })); setPinStep(2); setTimeout(() => setPin(""), 50); return; }
        if (p === form.pin) {
          setLoad(true);
          const phoneValue = form.phone.trim();
          const data = await apiSignUp(form.email, form.pin, { name: form.name, avatar: form.avatar, phone: phoneValue });
          if (data.access_token) {
            await apiUpsertProfile(data.access_token, data.user.id, form.name, form.avatar);
            saveSess({ access_token: data.access_token, refresh_token: data.refresh_token, userId: data.user.id });
            const newU = { email: form.email, name: form.name, avatar: form.avatar, phone: phoneValue, userId: data.user.id };
            saveLocalU([...loadLocalU().filter(u => u.email !== form.email), newU]);
            const prog = await apiGetProgress(data.access_token, data.user.id);
            setLoad(false);
            onLogin(newU, data.access_token, data.refresh_token, data.user.id, prog?.[0]?.owned || {});
            return;
          }
          if (data.user || data.id) {
            const signIn = await apiSignIn(form.email, form.pin);
            setLoad(false);
            if (signIn.access_token) {
              await apiUpsertProfile(signIn.access_token, signIn.user.id, form.name, form.avatar);
              saveSess({ access_token: signIn.access_token, refresh_token: signIn.refresh_token, userId: signIn.user.id });
              const phoneValue = form.phone.trim();
              const newU = { email: form.email, name: form.name, avatar: form.avatar, phone: phoneValue, userId: signIn.user.id };
              saveLocalU([...loadLocalU().filter(u => u.email !== form.email), newU]);
              const prog = await apiGetProgress(signIn.access_token, signIn.user.id);
              onLogin(newU, signIn.access_token, signIn.refresh_token, signIn.user.id, prog?.[0]?.owned || {});
              return;
            }
          }
          setLoad(false);
          const rawMsg = data.error_description || data.error || data.msg || data.message || "";
          const lowerMsg = rawMsg.toLowerCase();
          if (data.status === 429 || lowerMsg.includes("rate limit") || lowerMsg.includes("too many requests")) {
            doShake("Demasiados intentos. Esperá un momento e intentá nuevamente.");
            setView("reg1");
            return;
          }
          const isDuplicate = lowerMsg.includes("already registered") || lowerMsg.includes("user already registered") || lowerMsg.includes("duplicate") || lowerMsg.includes("already exists") || lowerMsg.includes("email has already been registered");
          doShake(isDuplicate ? "Email ya registrado" : rawMsg.slice(0, 60));
          setView("reg1");
        } else {
          doShake("Los PINs no coinciden"); setPin(""); setPinStep(1); setForm(f => ({ ...f, pin: "" }));
        }
      };

      const card = { background: "rgba(255,255,255,0.04)", borderRadius: 18, padding: "24px 20px", border: "1px solid rgba(255,255,255,0.08)", width: "100%", maxWidth: 360 };
      const inp = { width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, padding: "11px 14px", color: "#fff", fontSize: 14, outline: "none", fontFamily: "'Barlow',sans-serif" };
      const lbl = { fontSize: 11, color: "rgba(255,255,255,0.45)", marginBottom: 6, fontWeight: 600, display: "block", letterSpacing: 1 };
      const backBtn = { background: "none", border: "none", color: "rgba(255,255,255,0.4)", cursor: "pointer", fontSize: 13, marginBottom: 16, padding: 0, fontFamily: "'Barlow',sans-serif" };

      return (
        <div style={{ background: "#0d0d1a", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "20px 16px" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 52, marginBottom: 6 }}>⚽</div>
            <div style={{ fontSize: 10, letterSpacing: 3, color: "#f72585", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700 }}>ÁLBUM PANINI</div>
            <h1 style={{ margin: "4px 0 0", fontSize: 28, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900 }}>
              WORLD CUP <span style={{ color: "#ffd60a" }}>2026™</span>
            </h1>
            <p style={{ color: "rgba(255,255,255,0.3)", fontSize: 12, marginTop: 6 }}>Tracker de stickers · {TOTAL} stickers</p>
          </div>

          <div style={{ ...(shake ? { animation: "shake .4s" } : {}), width: "100%", display: "flex", justifyContent: "center" }}>

            {view === "list" && (
              <div style={card} className="fadein">

    // ══════════════════════════════════════════
    // RANKING
    // ══════════════════════════════════════════
    function RankingScreen({ userId, token, onClose }) {
      const [data, setData] = useState([]);
      const [loading, setLoad] = useState(true);
      useEffect(() => {
        (async () => {
          const [profiles, progresses] = await Promise.all([apiGetProfiles(token), apiGetAllProgress(token)]);
          if (!Array.isArray(profiles)) { setLoad(false); return; }
          const pm = {};
          if (Array.isArray(progresses)) progresses.forEach(p => { pm[p.user_id] = Object.keys(p.owned || {}).length; });
          setData(profiles.map(p => ({ ...p, count: pm[p.user_id] || 0, pct: Math.round(((pm[p.user_id] || 0) / TOTAL) * 100) })).sort((a, b) => b.count - a.count));
          setLoad(false);
        })();
      }, []);
      const medals = ["🥇", "🥈", "🥉"];
      return (
        <div style={{ background: "#0d0d1a", minHeight: "100vh", paddingBottom: 40 }}>
          <div style={{ background: "linear-gradient(160deg,#1a0a2e,#0d1535)", padding: "22px 20px 18px", borderBottom: "1px solid rgba(247,37,133,0.15)", display: "flex", alignItems: "center", gap: 12 }}>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 22, padding: 0 }}>←</button>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 3, color: "#f72585", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700 }}>TABLA</div>
              <h2 style={{ margin: 0, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 22 }}>RANKING COLECCIONISTAS</h2>
            </div>
          </div>
          <div style={{ maxWidth: 600, margin: "0 auto", padding: "20px 14px" }}>
            {loading ? <Spin /> : data.length === 0 ? <p style={{ textAlign: "center", color: "rgba(255,255,255,0.3)" }}>No hay datos aún.</p>
              : data.map((u, i) => (
                <div key={u.user_id} className="fadein" style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", borderRadius: 14, marginBottom: 10, background: u.user_id === userId ? "rgba(247,37,133,0.07)" : "rgba(255,255,255,0.04)", border: `1px solid ${u.user_id === userId ? "rgba(247,37,133,0.3)" : "rgba(255,255,255,0.07)"}` }}>
                  <div style={{ fontSize: 24, width: 30, textAlign: "center", flexShrink: 0 }}>{medals[i] || `#${i + 1}`}</div>
                  <div style={{ fontSize: 30, flexShrink: 0 }}>{u.avatar}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                      <span style={{ fontWeight: 700, fontSize: 15, fontFamily: "'Barlow Condensed',sans-serif" }}>{u.name}</span>
                      {u.user_id === userId && <span style={{ fontSize: 9, background: "#f72585", color: "#fff", borderRadius: 4, padding: "1px 6px", fontWeight: 700 }}>TÚ</span>}
                    </div>
                    <Bar pct={u.pct} color={i === 0 ? "#ffd60a" : i === 1 ? "#bdbdbd" : i === 2 ? "#ff9800" : "#f72585"} />
                    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 3 }}>
                      <span style={{ fontSize: 10, color: "rgba(255,255,255,0.35)" }}>{u.count} stickers</span>
                      <span style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.6)" }}>{u.pct}%</span>
                    </div>
                  </div>
                </div>
              ))}
          </div>
        </div>
      );
    }

    function MissingListScreen({ owned, onToggle, onClose }) {
      const groups = GROUPS.map(group => {
        const teams = group.teams.map(team => {
          const missing = Array.from({ length: 20 }, (_, i) => `${team.id}${i + 1}`).filter(key => !owned[key]);
          return missing.length ? { ...team, missing } : null;
        }).filter(Boolean);
        return teams.length ? { id: group.id, teams } : null;
      }).filter(Boolean);

      const special = SPECIAL.map(section => {
        const missing = Array.from({ length: section.count }, (_, i) => `${section.id}${i + 1}`).filter(key => !owned[key]);
        return missing.length ? { ...section, missing } : null;
      }).filter(Boolean);

      const totalMissing = groups.reduce((sum, group) => sum + group.teams.reduce((a, team) => a + team.missing.length, 0), 0)
        + special.reduce((sum, section) => sum + section.missing.length, 0);

      return (
        <div style={{ background: "#0d0d1a", minHeight: "100vh", paddingBottom: 40 }}>
          <div style={{ background: "linear-gradient(160deg,#1a0a2e,#0d1535)", padding: "22px 20px 18px", borderBottom: "1px solid rgba(247,37,133,0.15)", position: "relative", minHeight: 120, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <button onClick={onClose} style={{ position: "absolute", left: 20, background: "none", border: "none", color: "rgba(255,255,255,0.75)", cursor: "pointer", fontSize: 24, padding: 0 }}>←</button>
            <div style={{ textAlign: "center", width: "100%", maxWidth: 520, padding: "0 40px" }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: "#f72585", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700 }}>LISTADO COMPLETO</div>
              <h2 style={{ margin: "8px 0 0", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 22 }}>Faltantes por equipo y grupo</h2>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.55)", marginTop: 6 }}>{totalMissing} stickers faltantes</div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", marginTop: 6 }}>Tocá un sticker faltante para marcarlo como adquirido.</div>
            </div>
          </div>
          <div style={{ maxWidth: 700, margin: "0 auto", padding: "20px 14px", display: "grid", gap: 16 }}>
            {groups.map(group => (
              <div key={group.id} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 16, border: "1px solid rgba(255,255,255,0.08)", padding: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 12 }}>
                  <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: 1, color: "#fff", fontFamily: "'Barlow Condensed',sans-serif" }}>Grupo {group.id}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)" }}>{group.teams.reduce((sum, team) => sum + team.missing.length, 0)} faltantes</div>
                </div>
                <div style={{ display: "grid", gap: 12 }}>
                  {group.teams.map(team => (
                    <div key={team.id} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: 14 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 10 }}>
                        <div style={{ fontSize: 20 }}>{team.flag}</div>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 15, color: "#fff", fontFamily: "'Barlow Condensed',sans-serif" }}>{team.name}</div>
                          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)" }}>{team.id} · {team.missing.length} faltantes</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                        {team.missing.map(code => (
                          <button key={code} onClick={() => onToggle(code)} style={{ fontSize: 11, padding: "6px 10px", borderRadius: 999, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.08)", color: "#fff", fontFamily: "'Barlow Condensed',sans-serif", cursor: "pointer", transition: "transform .12s, background .12s", minWidth: 58, textAlign: "center" }}>
                            {code}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}

            {special.length > 0 && (
              <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 16, border: "1px solid rgba(255,255,255,0.08)", padding: 16 }}>
                <div style={{ fontSize: 14, fontWeight: 700, letterSpacing: 1, color: "#fff", fontFamily: "'Barlow Condensed',sans-serif", marginBottom: 12 }}>Especiales</div>
                <div style={{ display: "grid", gap: 12 }}>
                  {special.map(section => (
                    <div key={section.id} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: 14 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", fontFamily: "'Barlow Condensed',sans-serif" }}>{section.flag} {section.name}</div>
                        <div style={{ fontSize: 11, color: "rgba(255,255,255,0.45)" }}>{section.missing.length} faltantes</div>
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                        {section.missing.map(code => (
                          <button key={code} onClick={() => onToggle(code)} style={{ fontSize: 11, padding: "6px 10px", borderRadius: 999, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.08)", color: "#fff", fontFamily: "'Barlow Condensed',sans-serif", cursor: "pointer", transition: "transform .12s, background .12s", minWidth: 58, textAlign: "center" }}>
                            {code}
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {groups.length === 0 && special.length === 0 && (
              <div style={{ textAlign: "center", color: "rgba(255,255,255,0.4)", padding: 24, borderRadius: 14, background: "rgba(255,255,255,0.03)" }}>
                No hay faltantes. ¡Completaste todos los stickers!
              </div>
            )}
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════
    // TRACKER COMPONENTS
    // ══════════════════════════════════════════
    function StickerGrid({ sectionId, count, owned, onToggle }) {
      return (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(42px,1fr))", gap: 5, padding: "10px 0" }}>
          {Array.from({ length: count }, (_, i) => i + 1).map(n => {
            const key = `${sectionId}${n}`, has = !!owned[key], special = n === 1 || n === 13;
            return (
              <button key={n} onClick={() => onToggle(key)} style={{ width: "100%", aspectRatio: "3/4", borderRadius: 7, border: has ? "none" : "1.5px dashed rgba(255,255,255,0.18)", background: has ? (special ? "linear-gradient(135deg,#ffd60a,#ff9800)" : "linear-gradient(135deg,#4caf50,#2e7d32)") : "rgba(255,255,255,0.03)", color: has ? "#fff" : "rgba(255,255,255,0.28)", fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 1, boxShadow: has ? "0 2px 8px rgba(0,0,0,0.3)" : "none", transform: has ? "scale(1.04)" : "scale(1)" }}>
                <span style={{ fontSize: 13 }}>{has ? "✓" : n}</span>
                {!has && <span style={{ fontSize: 7, opacity: .35 }}>{sectionId}{n}</span>}
              </button>
            );
          })}
        </div>
      );
    }

    function TeamRow({ team, groupColor, owned, onToggle, isOpen, onOpen }) {
      const cnt = Array.from({ length: 20 }, (_, i) => `${team.id}${i + 1}`).filter(k => !!owned[k]).length;
      const done = cnt === 20;
      return (
        <div style={{ borderRadius: 12, border: `1px solid ${done ? groupColor : "rgba(255,255,255,0.07)"}`, overflow: "hidden", background: "rgba(255,255,255,0.03)", transition: "border-color .3s" }}>
          <button onClick={onOpen} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", padding: "11px 14px", display: "flex", alignItems: "center", gap: 10, textAlign: "left" }}>
            <span style={{ fontSize: 24, flexShrink: 0 }}>{team.flag}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
                <span style={{ color: "#fff", fontWeight: 700, fontSize: 15, fontFamily: "'Barlow Condensed',sans-serif" }}>{team.name}</span>
                {team.host && <span style={{ fontSize: 10, background: "#f72585", color: "#fff", borderRadius: 4, padding: "1px 5px", fontWeight: 700 }}>SEDE</span>}
                {team.debut && <span style={{ fontSize: 9, background: "#ffd60a", color: "#000", borderRadius: 4, padding: "1px 5px", fontWeight: 700 }}>DEBUT</span>}
                {done && <span style={{ fontSize: 11 }}>🏅</span>}
              </div>
              <Bar pct={(cnt / 20) * 100} color={done ? groupColor : "rgba(255,255,255,0.2)"} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 3 }}>
                <span style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", fontFamily: "monospace" }}>{team.id}1–{team.id}20</span>
                <span style={{ fontSize: 10, color: cnt > 0 ? groupColor : "rgba(255,255,255,0.3)", fontWeight: 700 }}>{cnt}/20</span>
              </div>
            </div>
            <span style={{ color: "rgba(255,255,255,0.25)", fontSize: 16, transform: isOpen ? "rotate(180deg)" : "none", transition: "transform .2s", flexShrink: 0 }}>▾</span>
          </button>
          {isOpen && (
            <div style={{ padding: "0 14px 14px", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
              <StickerGrid sectionId={team.id} count={20} owned={owned} onToggle={onToggle} />
              <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                <button onClick={() => Array.from({ length: 20 }, (_, i) => `${team.id}${i + 1}`).filter(k => !owned[k]).forEach(k => onToggle(k))} style={{ flex: 1, padding: "6px 0", borderRadius: 8, border: "none", background: groupColor, color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif" }}>✓ Marcar todas</button>
                <button onClick={() => Array.from({ length: 20 }, (_, i) => `${team.id}${i + 1}`).filter(k => owned[k]).forEach(k => onToggle(k))} style={{ flex: 1, padding: "6px 0", borderRadius: 8, border: "none", background: "rgba(255,255,255,0.08)", color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif" }}>✗ Limpiar</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function GroupCard({ group, owned, onToggle, openTeamId, onOpenTeam }) {
      const color = GC[group.id];
      const tot = group.teams.flatMap(t => Array.from({ length: 20 }, (_, i) => `${t.id}${i + 1}`)).filter(k => !!owned[k]).length;
      const total = group.teams.length * 20, pct = Math.round((tot / total) * 100);
      return (
        <div style={{ borderRadius: 16, overflow: "hidden", border: "1px solid rgba(255,255,255,0.08)" }}>
          <div style={{ background: `linear-gradient(135deg,${color}22,${color}11)`, borderBottom: `2px solid ${color}`, padding: "13px 16px", display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ width: 42, height: 42, borderRadius: 11, background: color, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 21, color: "#fff", flexShrink: 0 }}>{group.id}</div>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 14, color: "rgba(255,255,255,0.55)", letterSpacing: 1 }}>GRUPO {group.id} · {group.teams.map(t => t.flag).join(" ")}</span>
                <span style={{ fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, fontSize: 18, color }}>{pct}%</span>
              </div>
              <Bar pct={pct} color={color} />
              <span style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", marginTop: 3, display: "block" }}>{tot}/{total} stickers</span>
            </div>
          </div>
          <div style={{ padding: "10px", display: "flex", flexDirection: "column", gap: 6, background: "#0d0d1a" }}>
            {group.teams.map(team => (
              <TeamRow key={team.id} team={team} groupColor={color} owned={owned} onToggle={onToggle}
                isOpen={openTeamId === team.id} onOpen={() => onOpenTeam(openTeamId === team.id ? null : team.id)} />
            ))}
          </div>
        </div>
      );
    }

    function SpecialCard({ section, owned, onToggle, isOpen, onOpen }) {
      const cnt = Array.from({ length: section.count }, (_, i) => `${section.id}${i + 1}`).filter(k => !!owned[k]).length;
      return (
        <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 14, border: "1px solid rgba(255,255,255,0.08)", overflow: "hidden" }}>
          <button onClick={onOpen} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", padding: "14px 16px", display: "flex", alignItems: "center", gap: 12, textAlign: "left" }}>
            <span style={{ fontSize: 28 }}>{section.flag}</span>
            <div style={{ flex: 1 }}>
              <div style={{ color: "#ffd60a", fontWeight: 700, fontSize: 14, fontFamily: "'Barlow Condensed',sans-serif", marginBottom: 6 }}>{section.name}</div>
              <Bar pct={(cnt / section.count) * 100} color="#ffd60a" />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                <span style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", fontFamily: "monospace" }}>{section.id}1–{section.id}{section.count}</span>
                <span style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", fontWeight: 700 }}>{cnt}/{section.count}</span>
              </div>
            </div>
            <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 18, transform: isOpen ? "rotate(180deg)" : "none", transition: "transform .2s" }}>▾</span>
          </button>
          {isOpen && (
            <div style={{ padding: "0 16px 16px", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
              <StickerGrid sectionId={section.id} count={section.count} owned={owned} onToggle={onToggle} />
            </div>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════
    // MAIN TRACKER
    // ══════════════════════════════════════════
    function Tracker({ user, token, userId, initialOwned, onLogout, onShowInstallTip }) {
      const [owned, setOwned] = useState(initialOwned || {});
      const [openTeam, setOpenT] = useState(null);
      const [openSpec, setOpenS] = useState(null);
      const [search, setSearch] = useState("");
      const [activeG, setActiveG] = useState("Todos");
      const [tab, setTab] = useState("grupos");
      const [screen, setScreen] = useState("main");

      const toggle = useCallback((key) => {
        setOwned(prev => {
          const next = { ...prev };
          if (next[key]) delete next[key]; else next[key] = 1;
          apiUpsertProgress(token, userId, next);
          return next;
        });
      }, [token, userId]);

      useEffect(() => {
        const flushProgress = () => {
          if (!token || !userId) return;
          const payload = JSON.stringify({ user_id: userId, owned, updated_at: new Date().toISOString() });
          fetch(`${SB}/rest/v1/sticker_progress`, {
            method: "POST",
            headers: { ...H(token), Prefer: "resolution=merge-duplicates,return=minimal" },
            body: payload,
            keepalive: true,
          }).catch(() => { });
        };
        window.addEventListener("beforeunload", flushProgress);
        return () => window.removeEventListener("beforeunload", flushProgress);
      }, [owned, token, userId]);

      const totalOwned = Object.keys(owned).length;
      const pct = Math.round((totalOwned / TOTAL) * 100);
      const missing = TOTAL - totalOwned;

      const filteredGroups = useMemo(() => GROUPS.filter(g => {
        if (activeG !== "Todos" && g.id !== activeG) return false;
        if (!search) return true;
        return g.teams.some(t => t.name.toLowerCase().includes(search.toLowerCase()) || t.id.toLowerCase().includes(search.toLowerCase()));
      }), [search, activeG]);

      const chip = (active, color = "#f72585") => ({ padding: "5px 14px", borderRadius: 999, border: `1px solid ${active ? color : "rgba(255,255,255,0.1)"}`, background: active ? color : "transparent", color: active ? "#fff" : "rgba(255,255,255,0.45)", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", letterSpacing: .5, whiteSpace: "nowrap", flexShrink: 0 });

      if (screen === "ranking") return <RankingScreen userId={userId} token={token} onClose={() => setScreen("main")} />;
      if (screen === "missing") return <MissingListScreen owned={owned} onToggle={toggle} onClose={() => setScreen("main")} />;

      return (
        <div style={{ background: "#0d0d1a", minHeight: "100vh", paddingBottom: 50 }}>
          <div style={{ background: "linear-gradient(160deg,#1a0a2e,#0d1535)", padding: "18px 18px 14px", borderBottom: "1px solid rgba(247,37,133,0.15)", position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ maxWidth: 700, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ fontSize: 26, width: 38, height: 38, borderRadius: 10, background: "rgba(247,37,133,0.15)", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid rgba(247,37,133,0.25)", flexShrink: 0 }}>{user.avatar}</div>
                  <div>
                    <div style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", letterSpacing: 1, fontFamily: "'Barlow Condensed',sans-serif" }}>COLECCIONANDO</div>
                    <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Barlow Condensed',sans-serif" }}>{user.name}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 7, flexWrap: "wrap", justifyContent: "flex-end" }}>
                  <button onClick={onShowInstallTip} style={{ padding: "6px 11px", borderRadius: 9, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.05)", color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif" }}>📌 Guardar app</button>
                  <button onClick={() => setScreen("ranking")} style={{ padding: "6px 11px", borderRadius: 9, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.05)", color: "#ffd60a", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif" }}>🏆 Ranking</button>
                  <button onClick={onLogout} style={{ padding: "6px 11px", borderRadius: 9, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.45)", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif" }}>Salir</button>
                </div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 8 }}>
                <div>
                  <div style={{ fontSize: 9, letterSpacing: 3, color: "#f72585", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700 }}>ÁLBUM PANINI</div>
                  <div style={{ fontSize: 19, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900 }}>FIFA WORLD CUP <span style={{ color: "#ffd60a" }}>2026™</span></div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 28, fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 900, color: "#f72585", lineHeight: 1 }}>{pct}%</div>
                  <div style={{ fontSize: 10, color: "#ffd60a", fontWeight: 700 }}>⚡ {missing} faltantes</div>
                </div>
              </div>
              <Bar pct={pct} color="#f72585" />
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                {[
                  { v: `${GROUPS.filter(g => g.teams.every(t => Array.from({ length: 20 }, (_, i) => `${t.id}${i + 1}`).every(k => !!owned[k]))).length}/12`, l: "Grupos" },
                  { v: ALL_TEAMS.filter(t => Array.from({ length: 20 }, (_, i) => `${t.id}${i + 1}`).every(k => !!owned[k])).length, l: "Equipos completos" },
                  { v: totalOwned, l: "Stickers totales" },
                ].map(s => (
                  <div key={s.l} style={{ flex: 1, background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: "6px 8px", textAlign: "center" }}>
                    <div style={{ fontWeight: 900, fontSize: 15, fontFamily: "'Barlow Condensed',sans-serif" }}>{s.v}</div>
                    <div style={{ fontSize: 8, color: "rgba(255,255,255,0.35)", marginTop: 1, lineHeight: 1.3 }}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 700, margin: "0 auto", padding: "0 14px" }}>
            <div style={{ display: "flex", gap: 8, margin: "14px 0 12px" }}>
              {[["grupos", "⚽ GRUPOS (A–L)"], ["especial", "✨ ESPECIALES"]].map(([t, label]) => (
                <button key={t} onClick={() => { setTab(t); setScreen('main'); }} style={{ padding: "8px 18px", borderRadius: 999, border: "none", background: tab === t && screen === 'main' ? "#f72585" : "rgba(255,255,255,0.06)", color: tab === t && screen === 'main' ? "#fff" : "rgba(255,255,255,0.45)", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 13, letterSpacing: 1, cursor: "pointer" }}>{label}</button>
              ))}
              <button onClick={() => setScreen('missing')} style={{ padding: "8px 18px", borderRadius: 999, border: "none", background: screen === 'missing' ? "#f72585" : "rgba(247,37,133,0.12)", color: screen === 'missing' ? "#fff" : "#f72585", fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700, fontSize: 13, letterSpacing: 1, cursor: "pointer" }}>📋 Ver Faltantes</button>
            </div>

            {tab === "grupos" && (<>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Buscar equipo o código..."
                style={{ width: "100%", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "9px 14px", color: "#fff", fontSize: 13, outline: "none", marginBottom: 10, fontFamily: "'Barlow',sans-serif" }} />
              <div style={{ overflowX: "auto", display: "flex", gap: 7, paddingBottom: 8, marginBottom: 14 }}>
                <button onClick={() => setActiveG("Todos")} style={chip(activeG === "Todos")}>Todos</button>
                {GROUPS.map(g => {
                  const c = GC[g.id];
                  const t = g.teams.flatMap(t => Array.from({ length: 20 }, (_, i) => `${t.id}${i + 1}`)).filter(k => !!owned[k]).length;
                  return <button key={g.id} onClick={() => setActiveG(g.id)} style={{ ...chip(activeG === g.id, c), display: "flex", flexDirection: "column", alignItems: "center", gap: 1, padding: "4px 12px" }}><span>Grupo {g.id}</span><span style={{ fontSize: 9, opacity: .7 }}>{Math.round(t / (g.teams.length * 20) * 100)}%</span></button>;
                })}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {filteredGroups.map(group => (
                  <GroupCard key={group.id} group={group} owned={owned} onToggle={toggle} openTeamId={openTeam} onOpenTeam={setOpenT} />
                ))}
                {!filteredGroups.length && <div style={{ textAlign: "center", color: "rgba(255,255,255,0.3)", padding: 40 }}>Sin resultados</div>}
              </div>
            </>)}

            {tab === "especial" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {SPECIAL.map(s => <SpecialCard key={s.id} section={s} owned={owned} onToggle={toggle} isOpen={openSpec === s.id} onOpen={() => setOpenS(openSpec === s.id ? null : s.id)} />)}
              </div>
            )}
            <div style={{ marginTop: 40, textAlign: "center", fontSize: 10, color: "rgba(255,255,255,0.15)", lineHeight: 2 }}>
              980 stickers · 48 selecciones · 12 grupos<br />Guardado en Supabase ☁️
            </div>
            <div style={{ marginTop: 14, textAlign: "center", fontSize: 11, color: "rgba(255,255,255,0.32)", paddingBottom: 18 }}>
              Powered by <a href="https://momo.cr" target="_blank" rel="noreferrer noopener" style={{ color: "#f72585", textDecoration: "none" }}>Momo Studio</a> - Costa Rica 2026
            </div>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════
    // APP ROOT
    // ══════════════════════════════════════════
    function App() {
      const [state, setState] = useState({ status: "loading", user: null, token: null, userId: null, owned: {} });
      const [showInstallTip, setShowInstallTip] = useState(() => loadInstallTips());

      useEffect(() => {
        const sess = loadSess();
        if (!sess) { setState(s => ({ ...s, status: "auth" })); return; }
        apiRefresh(sess.refresh_token).then(async data => {
          if (data.access_token) {
            const localUsers = loadLocalU();
            const u = localUsers.find(x => x.userId === sess.userId) || { name: "Usuario", avatar: "⚽" };
            const prog = await apiGetProgress(data.access_token, data.user.id);
            saveSess({ access_token: data.access_token, refresh_token: data.refresh_token, userId: data.user.id });
            setState({ status: "app", user: { ...u, ...(data.user.user_metadata || {}) }, token: data.access_token, userId: data.user.id, owned: prog?.[0]?.owned || {} });
          } else {
            clearSess(); setState(s => ({ ...s, status: "auth" }));
          }
        }).catch(() => { clearSess(); setState(s => ({ ...s, status: "auth" })); });
      }, []);

      const handleLogin = (user, token, refreshToken, userId, owned) => {
        setState({ status: "app", user, token, userId, owned });
      };
      const handleLogout = () => {
        if (state.token) apiSignOut(state.token).catch(() => { });
        clearSess();
        setState({ status: "auth", user: null, token: null, userId: null, owned: {} });
      };
      const dismissInstallTip = () => { saveInstallTips(); setShowInstallTip(false); };
      const showInstallTipAgain = () => setShowInstallTip(true);

      if (state.status === "loading") return <Spin />;
      return (
        <>
          {showInstallTip && <InstallTip onClose={dismissInstallTip} />}
          {state.status === "auth"
            ? <AuthScreen onLogin={handleLogin} />
            : <Tracker user={state.user} token={state.token} userId={state.userId} initialOwned={state.owned} onLogout={handleLogout} onShowInstallTip={showInstallTipAgain} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
